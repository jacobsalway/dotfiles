unbind C-b
set -g prefix C-w
bind C-w send-prefix

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind S-h swap-pane -s '{left-of}'
bind S-j swap-pane -s '{down-of}'
bind S-k swap-pane -s '{up-of}'
bind S-l swap-pane -s '{right-of}'

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g mouse on

set -g pane-border-lines heavy
set -g pane-border-style fg=colour238,bg=colour233
set -g pane-active-border-style fg=colour238,bg=colour233

set -g focus-events on
set-hook -g pane-focus-out 'select-pane -P bg=colour233'
set-hook -g pane-focus-in 'select-pane -P bg=default'

set -g status on
set -g status-style bg=default

unbind c

bind r source-file ~/.tmux.conf

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g exit-unattached on
set -g destroy-unattached on
